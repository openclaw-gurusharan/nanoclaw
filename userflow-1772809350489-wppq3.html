<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo App</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #fafafa;
        color: #333;
        max-width: 480px;
        margin: 30px auto;
        padding: 16px;
        line-height: 1.5;
      }
      h1 {
        text-align: center;
        font-size: 1.5rem;
        font-weight: 600;
        margin-bottom: 16px;
        color: #222;
      }
      .input-group {
        display: flex;
        gap: 8px;
        margin-bottom: 12px;
      }
      input {
        flex: 1;
        padding: 8px 12px;
        font-size: 14px;
        border: 1px solid #ddd;
        border-radius: 4px;
        outline: none;
      }
      input:focus {
        border-color: #007bff;
      }
      button {
        padding: 8px 16px;
        font-size: 14px;
        font-weight: 500;
        background: #007bff;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }
      button:hover {
        background: #0056b3;
      }
      ul {
        list-style: none;
      }
      li {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 8px 12px;
        border-bottom: 1px solid #eee;
        font-size: 14px;
      }
      li.completed span {
        text-decoration: line-through;
        color: #999;
      }
      .delete-btn {
        background: #dc3545;
        padding: 4px 8px;
        font-size: 12px;
      }
      .delete-btn:hover {
        background: #c82333;
      }
      .filters {
        display: flex;
        gap: 4px;
        margin-bottom: 12px;
        justify-content: center;
      }
      .filters button {
        padding: 4px 10px;
        font-size: 12px;
        background: #6c757d;
      }
      .filters button.active {
        background: #007bff;
      }
    </style>
  </head>
  <body>
    <h1>Todo App</h1>
    <div class="input-group">
      <input type="text" id="todoInput" placeholder="Enter a task..." />
      <button id="addBtn">Add</button>
    </div>
    <div class="filters">
      <button id="filterAll" class="active">All</button>
      <button id="filterActive">Active</button>
      <button id="filterCompleted">Completed</button>
    </div>
    <ul id="todoList"></ul>

    <script>
      const input = document.getElementById('todoInput');
      const addBtn = document.getElementById('addBtn');
      const todoList = document.getElementById('todoList');
      const filterAll = document.getElementById('filterAll');
      const filterActive = document.getElementById('filterActive');
      const filterCompleted = document.getElementById('filterCompleted');

      let todos = [];
      let currentFilter = 'all';

      function render() {
        todoList.innerHTML = '';
        const filtered = todos.filter((todo) => {
          if (currentFilter === 'active') return !todo.completed;
          if (currentFilter === 'completed') return todo.completed;
          return true;
        });
        filtered.forEach((todo, index) => {
          const li = document.createElement('li');
          if (todo.completed) li.className = 'completed';
          li.innerHTML = `
          <span>${todo.text}</span>
          <button class="delete-btn" data-index="${index}">Delete</button>
        `;
          li.querySelector('span').addEventListener('click', () => {
            todos[index].completed = !todos[index].completed;
            render();
          });
          li.querySelector('.delete-btn').addEventListener('click', () => {
            todos.splice(index, 1);
            render();
          });
          todoList.appendChild(li);
        });
      }

      function setFilter(filter) {
        currentFilter = filter;
        filterAll.className = filter === 'all' ? 'active' : '';
        filterActive.className = filter === 'active' ? 'active' : '';
        filterCompleted.className = filter === 'completed' ? 'active' : '';
        render();
      }

      filterAll.addEventListener('click', () => setFilter('all'));
      filterActive.addEventListener('click', () => setFilter('active'));
      filterCompleted.addEventListener('click', () => setFilter('completed'));

      function addTodo() {
        const text = input.value.trim();
        if (text) {
          todos.push({ text, completed: false });
          input.value = '';
          render();
        }
      }

      addBtn.addEventListener('click', addTodo);
      input.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') addTodo();
      });

      render();
    </script>
  </body>
</html>
