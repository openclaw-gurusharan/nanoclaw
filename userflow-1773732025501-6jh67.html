<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      max-width: 500px;
      margin: 24px auto;
      padding: 16px;
      background: #ffffff;
      color: #1a1a1a;
      line-height: 1.5;
    }
    h1 {
      text-align: center;
      font-size: 1.5rem;
      font-weight: 600;
      color: #111;
      margin-bottom: 16px;
      letter-spacing: -0.02em;
    }
    .input-group {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    input[type="text"] {
      flex: 1;
      padding: 10px 12px;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      font-size: 0.9rem;
      font-weight: 400;
      background: #fafafa;
      transition: border-color 0.15s, background 0.15s;
    }
    input[type="text"]:focus {
      outline: none;
      border-color: #2563eb;
      background: #fff;
    }
    input[type="text"]::placeholder {
      color: #9ca3af;
    }
    button {
      padding: 10px 16px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover {
      background: #1d4ed8;
    }
    ul {
      list-style: none;
    }
    li {
      background: #fafafa;
      border: 1px solid #f0f0f0;
      padding: 10px 12px;
      margin-bottom: 6px;
      border-radius: 4px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    li span {
      font-size: 0.9rem;
      font-weight: 400;
      color: #333;
      line-height: 1.4;
    }
    li button {
      padding: 6px 10px;
      font-size: 0.75rem;
      font-weight: 500;
    }
    li .delete-btn {
      background: #ef4444;
    }
    li .delete-btn:hover {
      background: #dc2626;
    }
    .empty {
      text-align: center;
      color: #9ca3af;
      font-size: 0.85rem;
      padding: 16px;
    }
    .filters {
      display: flex;
      justify-content: center;
      gap: 4px;
      margin-bottom: 12px;
    }
    .filters button {
      padding: 6px 12px;
      background: transparent;
      color: #6b7280;
      font-size: 0.8rem;
      font-weight: 500;
    }
    .filters button.active {
      background: #2563eb;
      color: white;
    }
    .filters button:hover:not(.active) {
      background: #f3f4f6;
      color: #374151;
    }
    li.completed span {
      text-decoration: line-through;
      color: #9ca3af;
    }
    li .complete-btn {
      background: #10b981;
      margin-right: 4px;
    }
    li .complete-btn:hover {
      background: #059669;
    }
    li .complete-btn.completed {
      background: #9ca3af;
    }
  </style>
</head>
<body>
  <h1>Todo App</h1>
  <div class="input-group">
    <input type="text" id="todoInput" placeholder="Enter a todo...">
    <button id="addBtn">Add</button>
  </div>
  <div class="filters">
    <button id="filterAll" class="active">All</button>
    <button id="filterActive">Active</button>
    <button id="filterCompleted">Completed</button>
  </div>
  <ul id="todoList"></ul>

  <script>
    const todoInput = document.getElementById('todoInput');
    const addBtn = document.getElementById('addBtn');
    const todoList = document.getElementById('todoList');
    const filterAll = document.getElementById('filterAll');
    const filterActive = document.getElementById('filterActive');
    const filterCompleted = document.getElementById('filterCompleted');

    let currentFilter = 'all';

    function addTodo() {
      const text = todoInput.value.trim();
      if (!text) return;

      const li = document.createElement('li');
      li.dataset.completed = 'false';
      li.innerHTML = `<span>${escapeHtml(text)}</span>
        <div>
          <button class="complete-btn">Complete</button>
          <button class="delete-btn">Delete</button>
        </div>`;

      li.querySelector('.complete-btn').addEventListener('click', function() {
        const isCompleted = li.dataset.completed === 'true';
        li.dataset.completed = isCompleted ? 'false' : 'true';
        li.classList.toggle('completed', !isCompleted);
        this.textContent = isCompleted ? 'Complete' : 'Undo';
        this.classList.toggle('completed', !isCompleted);
        applyFilter();
      });

      li.querySelector('.delete-btn').addEventListener('click', function() {
        li.remove();
        updateEmptyState();
      });

      todoList.appendChild(li);
      todoInput.value = '';
      updateEmptyState();
      applyFilter();
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function updateEmptyState() {
      const items = Array.from(todoList.children).filter(li => !li.classList.contains('empty'));
      if (items.length === 0) {
        todoList.innerHTML = '<li class="empty">No todos yet. Add one above!</li>';
      }
    }

    function applyFilter() {
      const items = todoList.querySelectorAll('li');
      items.forEach(li => {
        if (li.classList.contains('empty')) return;
        const isCompleted = li.dataset.completed === 'true';
        if (currentFilter === 'all') {
          li.style.display = '';
        } else if (currentFilter === 'active') {
          li.style.display = isCompleted ? 'none' : '';
        } else if (currentFilter === 'completed') {
          li.style.display = isCompleted ? '' : 'none';
        }
      });
    }

    filterAll.addEventListener('click', function() {
      currentFilter = 'all';
      filterAll.classList.add('active');
      filterActive.classList.remove('active');
      filterCompleted.classList.remove('active');
      applyFilter();
    });

    filterActive.addEventListener('click', function() {
      currentFilter = 'active';
      filterActive.classList.add('active');
      filterAll.classList.remove('active');
      filterCompleted.classList.remove('active');
      applyFilter();
    });

    filterCompleted.addEventListener('click', function() {
      currentFilter = 'completed';
      filterCompleted.classList.add('active');
      filterAll.classList.remove('active');
      filterActive.classList.remove('active');
      applyFilter();
    });

    addBtn.addEventListener('click', addTodo);

    todoInput.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        addTodo();
      }
    });

    updateEmptyState();
  </script>
</body>
</html>
