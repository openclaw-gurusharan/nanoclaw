<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo App</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        max-width: 500px;
        margin: 50px auto;
        padding: 20px;
      }
      h1 {
        text-align: center;
        margin-bottom: 20px;
      }
      .input-group {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
      }
      input[type='text'] {
        flex: 1;
        padding: 10px;
        font-size: 16px;
        border: 1px solid #ddd;
        border-radius: 4px;
      }
      button {
        padding: 10px 20px;
        font-size: 16px;
        background: #007bff;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }
      button:hover {
        background: #0056b3;
      }
      ul {
        list-style: none;
      }
      li {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px;
        border-bottom: 1px solid #eee;
      }
      li.completed {
        text-decoration: line-through;
        color: #888;
      }
      .delete-btn {
        background: #dc3545;
        padding: 5px 10px;
        font-size: 14px;
      }
      .delete-btn:hover {
        background: #c82333;
      }
    </style>
  </head>
  <body>
    <h1>Todo App</h1>
    <div class="input-group">
      <input type="text" id="todoInput" placeholder="Enter todo..." />
      <button id="addBtn">Add</button>
    </div>
    <ul id="todoList"></ul>
    <script>
      const input = document.getElementById('todoInput');
      const addBtn = document.getElementById('addBtn');
      const todoList = document.getElementById('todoList');
      let todos = [];

      function render() {
        todoList.innerHTML = '';
        todos.forEach((todo, index) => {
          const li = document.createElement('li');
          if (todo.completed) li.className = 'completed';
          li.innerHTML = `
          <span>${todo.text}</span>
          <button class="delete-btn" onclick="deleteTodo(${index})">Delete</button>
        `;
          li.firstChild.onclick = () => toggleTodo(index);
          todoList.appendChild(li);
        });
      }

      function addTodo() {
        const text = input.value.trim();
        if (text) {
          todos.push({ text, completed: false });
          input.value = '';
          render();
        }
      }

      function toggleTodo(index) {
        todos[index].completed = !todos[index].completed;
        render();
      }

      function deleteTodo(index) {
        todos.splice(index, 1);
        render();
      }

      addBtn.onclick = addTodo;
      input.onkeypress = (e) => {
        if (e.key === 'Enter') addTodo();
      };
      render();
    </script>
  </body>
</html>
